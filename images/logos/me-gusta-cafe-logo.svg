<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="92"/>
    </clipPath>
  </defs>
  <!-- PNG clipped to circle (removes white corners) -->
  <image href="me-gusta-cafe.png" x="0" y="0" width="200" height="200" clip-path="url(#circleClip)"/>
  <!-- Green circle border on top -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#5aaa6a" stroke-width="4"/>
</svg>
