<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <path id="topArc" d="M 26,98 A 74,74 0 0,1 174,98"/>
  </defs>

  <!-- Circle border -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#5aaa6a" stroke-width="3.5"/>

  <!-- ME GUSTA arc text -->
  <text font-family="Arial,Helvetica,sans-serif" font-size="16.5" font-weight="800" letter-spacing="5" fill="#5aaa6a" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">ME GUSTA</textPath>
  </text>

  <!-- RIGHT cup (green) — drawn first so brown overlaps it -->
  <g fill="none" stroke="#5aaa6a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cup body -->
    <path d="M108 80 Q107 78 110 77 L140 77 Q143 78 142 80 L138 108 Q137 110 135 110 L114 110 Q112 110 111 108 Z"/>
    <!-- Saucer -->
    <ellipse cx="125" cy="114" rx="18" ry="4.5"/>
    <!-- Handle -->
    <path d="M142 84 Q154 84 154 93 Q154 104 142 104"/>
  </g>

  <!-- LEFT cup (brown) — drawn on top -->
  <g fill="none" stroke="#8b4513" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cup body -->
    <path d="M62 72 Q61 70 64 69 L98 69 Q101 70 100 72 L96 102 Q95 104 93 104 L70 104 Q68 104 67 102 Z"/>
    <!-- Saucer -->
    <ellipse cx="81" cy="108" rx="21" ry="5"/>
    <!-- Handle -->
    <path d="M100 76 Q114 76 114 86 Q114 98 100 98"/>
  </g>

  <!-- Café script -->
  <text x="100" y="162" font-family="Georgia,'Times New Roman',serif" font-size="35" font-weight="700" font-style="italic" fill="#8b4513" text-anchor="middle">Café</text>
</svg>
